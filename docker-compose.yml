version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MOCK_MODE=true
      - OS_AUTH_URL=http://keystone:5000/v3
      - OS_USERNAME=admin
      - OS_PASSWORD=secret
      - OS_PROJECT_NAME=admin
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Uncomment for real OpenStack development stack:
  # keystone:
  #   image: openstack/keystone
  #   ...
